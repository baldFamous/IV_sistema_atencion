<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Turnos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #cfd8dc; text-align: center; }
        .info-header { position: absolute; top: 20px; width: 90%; text-align: center; font-size: 1.2em; color: #495057;}
        .info-header p { margin: 5px; }
        .container { display: flex; width: 90%; max-width: 1200px; height: 70%; max-height: 600px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); border-radius: 10px; overflow: hidden;}
        .panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 2.5vw; /* Responsive font size */ padding: 20px; transition: background-color 0.5s ease; }
        .sae { background-color: #28a745; /* Verde */ }
        .becas { background-color: #17a2b8; /* Celeste/teal */ }
        .mineduc { background-color: #ffc107; /* Amarillo */ color: #333; /* Texto oscuro para mejor contraste */ }
        .panel h2 { font-size: calc(1.5em + 1vw); /* Título más grande y responsive */ margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .panel p.count { font-size: calc(4em + 2vw); /* Contador muy grande y responsive */ font-weight: bold; margin: 0; line-height: 1; }
        .status-footer { position: absolute; bottom: 10px; left: 10px; background-color: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 5px; font-size: 0.9em; color: #333; border: 1px solid #ccc;}
        .module {
            font-size: calc(1.5em + 1vw);
            margin-top: 10px;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; height: 80%; }
            .panel { font-size: 4vw; }
            .panel h2 { font-size: calc(1.2em + 2vw); }
            .panel p.count { font-size: calc(3em + 3vw); }
            .info-header { font-size: 1em; }
            .module {
                font-size: calc(1.2em + 1vw);
            }
        }
    </style>
</head>
<body id="display-page">
    <div class="info-header">
        <p>Sistema de Atención al Público</p>
        <p id="system-status-public">Cargando estado del sistema...</p>
    </div>

    <div class="container">
        <div class="panel sae">
            <h2>SAE</h2>
            <p class="count" id="sae-count-display">0</p>
            <p class="module" id="sae-module-display"></p>
        </div>
        <div class="panel becas">
            <h2>Becas</h2>
            <p class="count" id="becas-count-display">0</p>
            <p class="module" id="becas-module-display"></p>
        </div>
        <div class="panel mineduc">
            <h2>Ayuda Mineduc</h2>
            <p class="count" id="mineduc-count-display">0</p>
            <p class="module" id="mineduc-module-display"></p>
        </div>
    </div>
    <div id="status-footer">Conectando...</div>

    <script>
        const saeCountDisplayEl = document.getElementById('sae-count-display');
        const mineducCountDisplayEl = document.getElementById('mineduc-count-display');
        const becasCountDisplayEl = document.getElementById('becas-count-display');
        const statusFooterEl = document.getElementById('status-footer');
        const systemStatusPublicEl = document.getElementById('system-status-public');
        const saeModuleDisplayEl = document.getElementById('sae-module-display');
        const mineducModuleDisplayEl = document.getElementById('mineduc-module-display');
        const becasModuleDisplayEl = document.getElementById('becas-module-display');

        const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
        const ws_path = `${ws_scheme}://${window.location.host}/ws/turnos/`;
        const turnoSocket = new WebSocket(ws_path);

        turnoSocket.onopen = function(e) {
            statusFooterEl.textContent = 'Conectado al sistema de turnos.';
            statusFooterEl.style.color = 'green';
        };

        turnoSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const audio = new Audio('/static/beep.mp3')

            if (data.type === 'update_counts') {
                let saeChanged = (saeCountDisplayEl.textContent !== data.counts.SAE.toString()) || (data.counts.recall_unit === 'SAE');
                let mineducChanged = (mineducCountDisplayEl.textContent !== data.counts.MINEDUC.toString()) || (data.counts.recall_unit === 'MINEDUC');
                let becasChanged = (becasCountDisplayEl.textContent !== data.counts.BECAS.toString()) || (data.counts.recall_unit === 'BECAS');

                if (saeChanged || mineducChanged || becasChanged) {
                    audio.currentTime = 0;
                    audio.play();

                    // Animación breve de los paneles
                    if (saeChanged) {
                        const panel = document.querySelector('.panel.sae');
                        panel.style.backgroundColor = '#1e7e34';
                        setTimeout(() => { panel.style.backgroundColor = ''; }, 600);
                    }
                    if (mineducChanged) {
                        const panel = document.querySelector('.panel.mineduc');
                        panel.style.backgroundColor = '#d39e00';
                        setTimeout(() => { panel.style.backgroundColor = ''; }, 600);
                    }
                    if (becasChanged) {
                        const panel = document.querySelector('.panel.becas');
                        panel.style.backgroundColor = '#117a8b';
                        setTimeout(() => { panel.style.backgroundColor = ''; }, 600);
                    }
                }

                saeCountDisplayEl.textContent = data.counts.SAE;
                mineducCountDisplayEl.textContent = data.counts.MINEDUC;
                becasCountDisplayEl.textContent = data.counts.BECAS;
                
                if (data.counts.SAE_module) {
                    saeModuleDisplayEl.textContent = `Módulo ${data.counts.SAE_module}`;
                } else {
                    saeModuleDisplayEl.textContent = '';
                }
                
                if (data.counts.MINEDUC_module) {
                    mineducModuleDisplayEl.textContent = `Módulo ${data.counts.MINEDUC_module}`;
                } else {
                    mineducModuleDisplayEl.textContent = '';
                }

                if (data.counts.BECAS_module) {
                    becasModuleDisplayEl.textContent = `Módulo ${data.counts.BECAS_module}`;
                } else {
                    becasModuleDisplayEl.textContent = '';
                }

                if (data.counts.is_operational === false) {
                    systemStatusPublicEl.textContent = data.counts.message || 'Sistema fuera de horario. Los contadores se muestran en 0.';
                    systemStatusPublicEl.style.color = 'red';
                } else {
                    systemStatusPublicEl.textContent = data.counts.message || 'Sistema operacional. Contadores actualizados.';
                    systemStatusPublicEl.style.color = 'green';
                }
                statusFooterEl.textContent = 'Última actualización recibida.';
            }
        };

        turnoSocket.onclose = function(e) {
            statusFooterEl.textContent = 'Desconectado. Intentando reconectar...';
            statusFooterEl.style.color = 'red';
            systemStatusPublicEl.textContent = 'Conexión perdida con el servidor.';
            systemStatusPublicEl.style.color = 'red';
            saeCountDisplayEl.textContent = 'X';
            mineducCountDisplayEl.textContent = 'X';
            becasCountDisplayEl.textContent = 'X';
             // Recargar para reintentar conexión
            setTimeout(() => { window.location.reload(); }, 5000);
        };

        turnoSocket.onerror = function(err) {
            statusFooterEl.textContent = 'Error de Conexión WebSocket.';
            statusFooterEl.style.color = 'red';
            systemStatusPublicEl.textContent = 'Error crítico en la conexión con el servidor.';
            systemStatusPublicEl.style.color = 'red';
            console.error('WebSocket Error:', err);
            saeCountDisplayEl.textContent = 'X';
            mineducCountDisplayEl.textContent = 'X';
            becasCountDisplayEl.textContent = 'X';
        }
    </script>
</body>
</html>
